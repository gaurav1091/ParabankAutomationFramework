name: Parabank CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      suite:
        required: true
        default: "smoke"
        type: choice
        options: [smoke, regression, ui, api, hybrid]

      execution_mode:
        required: true
        default: "single"
        type: choice
        options: [single, matrix]

      browser:
        required: true
        default: "chrome"
        type: choice
        options: [chrome, firefox, edge]

      browser_matrix:
        required: true
        default: "chrome-firefox"
        type: choice
        options:
          - chrome-only
          - firefox-only
          - edge-only
          - chrome-firefox
          - chrome-edge
          - firefox-edge
          - chrome-firefox-edge

      remote_provider:
        required: true
        default: "local"
        type: choice
        options: [local, selenium-grid, browserstack]

      selenium_remote_url:
        required: false
        default: "http://localhost:4444"

      browserstack_os:
        required: true
        default: "Windows"
        type: choice
        options: [Windows, OS X]

      browserstack_os_version:
        required: true
        default: "11"
        type: choice
        options: ["11", "10", Sonoma, Sequoia]

      browserstack_browser_version:
        required: true
        default: "latest"
        type: choice
        options: [latest, latest-1, latest-2]

      env:
        required: true
        default: "qa"
        type: choice
        options: [qa, stage, dev]

      retry_count:
        required: true
        default: "2"
        type: choice
        options: ["0", "1", "2", "3"]

      thread_count:
        required: true
        default: "5"
        type: choice
        options: ["1","2","3","4","5","6","7","8","10"]

      data_provider_thread_count:
        required: true
        default: "2"
        type: choice
        options: ["1","2","3","4","5"]

      parallel_mode:
        required: true
        default: "methods"
        type: choice
        options: [none, methods, classes, tests, instances]

      headless:
        required: true
        default: "true"
        type: choice
        options: ["true","false"]

  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read

concurrency:
  group: parabank-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =========================================================
# PREPARE JOB
# =========================================================
jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      suite: ${{ steps.config.outputs.suite }}
      runner_class: ${{ steps.config.outputs.runner_class }}
      test_env: ${{ steps.config.outputs.test_env }}
      retry_count: ${{ steps.config.outputs.retry_count }}
      thread_count: ${{ steps.config.outputs.thread_count }}
      data_provider_thread_count: ${{ steps.config.outputs.data_provider_thread_count }}
      parallel_mode: ${{ steps.config.outputs.parallel_mode }}
      headless: ${{ steps.config.outputs.headless }}
      browsers_json: ${{ steps.config.outputs.browsers_json }}
      remote_provider: ${{ steps.config.outputs.remote_provider }}
      selenium_remote_url: ${{ steps.config.outputs.selenium_remote_url }}
      browserstack_os: ${{ steps.config.outputs.browserstack_os }}
      browserstack_os_version: ${{ steps.config.outputs.browserstack_os_version }}
      browserstack_browser_version: ${{ steps.config.outputs.browserstack_browser_version }}

    steps:
      - id: config
        run: |
          SUITE="${{ github.event.inputs.suite || 'smoke' }}"
          EXECUTION_MODE="${{ github.event.inputs.execution_mode || 'single' }}"
          SINGLE_BROWSER="${{ github.event.inputs.browser || 'chrome' }}"
          BROWSER_MATRIX="${{ github.event.inputs.browser_matrix || 'chrome-firefox' }}"
          REMOTE_PROVIDER="${{ github.event.inputs.remote_provider || 'local' }}"
          SELENIUM_REMOTE_URL="${{ github.event.inputs.selenium_remote_url || 'http://localhost:4444' }}"
          BROWSERSTACK_OS="${{ github.event.inputs.browserstack_os || 'Windows' }}"
          BROWSERSTACK_OS_VERSION="${{ github.event.inputs.browserstack_os_version || '11' }}"
          BROWSERSTACK_BROWSER_VERSION="${{ github.event.inputs.browserstack_browser_version || 'latest' }}"
          TEST_ENV="${{ github.event.inputs.env || 'qa' }}"
          RETRY_COUNT="${{ github.event.inputs.retry_count || '2' }}"
          THREAD_COUNT="${{ github.event.inputs.thread_count || '5' }}"
          DATA_PROVIDER_THREAD_COUNT="${{ github.event.inputs.data_provider_thread_count || '2' }}"
          PARALLEL_MODE="${{ github.event.inputs.parallel_mode || 'methods' }}"
          HEADLESS="${{ github.event.inputs.headless || 'true' }}"

          case "$SUITE" in
            smoke) RUNNER_CLASS="com.parabank.automation.runners.SmokeTestRunner" ;;
            regression) RUNNER_CLASS="com.parabank.automation.runners.RegressionTestRunner" ;;
            ui) RUNNER_CLASS="com.parabank.automation.runners.UiTestRunner" ;;
            api) RUNNER_CLASS="com.parabank.automation.runners.ApiTestRunner" ;;
            hybrid) RUNNER_CLASS="com.parabank.automation.runners.HybridTestRunner" ;;
          esac

          if [[ "$EXECUTION_MODE" == "single" ]]; then
            BROWSERS_JSON="[\"$SINGLE_BROWSER\"]"
          else
            case "$BROWSER_MATRIX" in
              chrome-firefox) BROWSERS_JSON='["chrome","firefox"]' ;;
              chrome-firefox-edge) BROWSERS_JSON='["chrome","firefox","edge"]' ;;
              chrome-only) BROWSERS_JSON='["chrome"]' ;;
              firefox-only) BROWSERS_JSON='["firefox"]' ;;
              edge-only) BROWSERS_JSON='["edge"]' ;;
            esac
          fi

          echo "suite=$SUITE" >> $GITHUB_OUTPUT
          echo "runner_class=$RUNNER_CLASS" >> $GITHUB_OUTPUT
          echo "test_env=$TEST_ENV" >> $GITHUB_OUTPUT
          echo "retry_count=$RETRY_COUNT" >> $GITHUB_OUTPUT
          echo "thread_count=$THREAD_COUNT" >> $GITHUB_OUTPUT
          echo "data_provider_thread_count=$DATA_PROVIDER_THREAD_COUNT" >> $GITHUB_OUTPUT
          echo "parallel_mode=$PARALLEL_MODE" >> $GITHUB_OUTPUT
          echo "headless=$HEADLESS" >> $GITHUB_OUTPUT
          echo "browsers_json=$BROWSERS_JSON" >> $GITHUB_OUTPUT
          echo "remote_provider=$REMOTE_PROVIDER" >> $GITHUB_OUTPUT
          echo "selenium_remote_url=$SELENIUM_REMOTE_URL" >> $GITHUB_OUTPUT
          echo "browserstack_os=$BROWSERSTACK_OS" >> $GITHUB_OUTPUT
          echo "browserstack_os_version=$BROWSERSTACK_OS_VERSION" >> $GITHUB_OUTPUT
          echo "browserstack_browser_version=$BROWSERSTACK_BROWSER_VERSION" >> $GITHUB_OUTPUT

# =========================================================
# TEST JOB (UNCHANGED CORE)
# =========================================================
  test:
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: ${{ fromJson(needs.prepare.outputs.browsers_json) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Run Tests
        run: |
          mvn clean test \
            -Denv=${{ needs.prepare.outputs.test_env }} \
            -Dbrowser=${{ matrix.browser }} \
            -Dexecution.mode=${{ needs.prepare.outputs.remote_provider }}

      # 🔥 KEEP DEBUG
      - name: Debug generated test-output structure
        if: always()
        run: |
          find test-output || true

      - name: Upload framework reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: framework-reports-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}
          path: test-output

# =========================================================
# BUILD PAGES SITE (FIXED + HISTORY)
# =========================================================
  build-extent-pages-site:
    needs: [prepare, test]
    if: ${{ always() && github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest

    steps:
      # 🔥 CLEAN EVERYTHING FIRST
      - name: Clean previous artifacts
        run: rm -rf pages-site downloaded-framework-reports || true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: framework-reports-${{ needs.prepare.outputs.suite }}-*
          path: downloaded-framework-reports

      # 🔥 KEEP DEBUG
      - name: Debug downloaded artifacts
        run: |
          find downloaded-framework-reports || true

      - name: Build Pages Site
        run: |
          SITE_DIR="pages-site"
          RUN_DIR="$SITE_DIR/reports/run-${GITHUB_RUN_NUMBER}"

          mkdir -p "$RUN_DIR"
          touch "$SITE_DIR/.nojekyll"

          for dir in downloaded-framework-reports/*; do
            name=$(basename "$dir")

            browser="${name##*-}"
            browser_cap="$(tr '[:lower:]' '[:upper:]' <<< ${browser:0:1})${browser:1}"

            target="$RUN_DIR/$browser"
            mkdir -p "$target"

            cp -R "$dir/"* "$target/" || true

            echo "<h2>${browser_cap}</h2>" >> "$RUN_DIR/index.html"
            echo "<a href=\"$browser/reports/ExtentReport_Latest.html\">Extent</a><br>" >> "$RUN_DIR/index.html"
            echo "<a href=\"$browser/cucumber/cucumber.html\">Cucumber</a><br><br>" >> "$RUN_DIR/index.html"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

# =========================================================
# DEPLOY
# =========================================================
  deploy-extent-pages-site:
    needs: build-extent-pages-site
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/deploy-pages@v4