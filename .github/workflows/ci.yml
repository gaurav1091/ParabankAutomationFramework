name: Parabank CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - ui
          - api
          - hybrid
      env:
        description: "Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - stage
          - dev
      browser:
        description: "Browser"
        required: true
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - edge
      retry_count:
        description: "Retry count"
        required: true
        default: "2"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read

concurrency:
  group: parabank-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Automation Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Determine suite configuration
        id: suite_config
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            SUITE="regression"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SUITE="${{ github.event.inputs.suite }}"
          else
            SUITE="smoke"
          fi

          case "$SUITE" in
            smoke)
              RUNNER_CLASS="com.parabank.automation.runners.SmokeTestRunner"
              ;;
            regression)
              RUNNER_CLASS="com.parabank.automation.runners.RegressionTestRunner"
              ;;
            ui)
              RUNNER_CLASS="com.parabank.automation.runners.TestRunner"
              ;;
            api)
              RUNNER_CLASS="com.parabank.automation.runners.ApiTestRunner"
              ;;
            hybrid)
              RUNNER_CLASS="com.parabank.automation.runners.HybridTestRunner"
              ;;
            *)
              echo "Unsupported suite: $SUITE"
              exit 1
              ;;
          esac

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TEST_ENV="${{ github.event.inputs.env }}"
            TEST_BROWSER="${{ github.event.inputs.browser }}"
            RETRY_COUNT="${{ github.event.inputs.retry_count }}"
          else
            TEST_ENV="qa"
            TEST_BROWSER="chrome"
            RETRY_COUNT="2"
          fi

          echo "suite=$SUITE" >> "$GITHUB_OUTPUT"
          echo "runner_class=$RUNNER_CLASS" >> "$GITHUB_OUTPUT"
          echo "test_env=$TEST_ENV" >> "$GITHUB_OUTPUT"
          echo "test_browser=$TEST_BROWSER" >> "$GITHUB_OUTPUT"
          echo "retry_count=$RETRY_COUNT" >> "$GITHUB_OUTPUT"

      - name: Print chosen configuration
        shell: bash
        run: |
          echo "Suite: ${{ steps.suite_config.outputs.suite }}"
          echo "Runner: ${{ steps.suite_config.outputs.runner_class }}"
          echo "Environment: ${{ steps.suite_config.outputs.test_env }}"
          echo "Browser: ${{ steps.suite_config.outputs.test_browser }}"
          echo "Retry Count: ${{ steps.suite_config.outputs.retry_count }}"

      - name: Run Maven suite
        shell: bash
        run: |
          mvn clean test \
            -Denv=${{ steps.suite_config.outputs.test_env }} \
            -Dbrowser=${{ steps.suite_config.outputs.test_browser }} \
            -Dheadless=true \
            -Dparallel.mode=methods \
            -Dthread.count=5 \
            -Ddata.provider.thread.count=2 \
            -Dretry.enabled=true \
            -Dretry.count=${{ steps.suite_config.outputs.retry_count }} \
            -Dtest=${{ steps.suite_config.outputs.runner_class }}

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ steps.suite_config.outputs.suite }}
          path: |
            target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload framework reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: framework-reports-${{ steps.suite_config.outputs.suite }}
          path: |
            test-output/reports/**
            test-output/logs/**
            test-output/screenshots/**
          if-no-files-found: warn
          retention-days: 14